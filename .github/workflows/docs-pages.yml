# Publishes docs/ to the gh-pages branch (no deploy-pages — avoids deployment_queued hangs).
# Repo Settings → Pages → Source: Deploy from branch → gh-pages → / (root)

name: Publish docs to gh-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish docs folder to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs
          force_orphan: true
