# Manual production deploy — run from GitHub Actions → Deploy to VPS → Run workflow.
# Syncs code with rsync (no git pull on server), then rebuilds Docker on the VPS.
# One-time setup: add repository secrets (see README → Production deploy).

name: Deploy to VPS

on:
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || 22 }}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR != '' && secrets.VPS_APP_DIR || '/var/www/checkmockup' }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          REMOTE="${VPS_USER}@${VPS_HOST}"
          RSYNC_RSH="ssh -p ${VPS_SSH_PORT} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          ssh -p "$VPS_SSH_PORT" -i ~/.ssh/deploy_key "$REMOTE" "mkdir -p '$VPS_APP_DIR'"
          rsync -avz --delete \
            --exclude-from=deploy/rsync-excludes.txt \
            -e "$RSYNC_RSH" \
            ./ \
            "$REMOTE:$VPS_APP_DIR/"

      - name: Remote Docker build and migrations
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR != '' && secrets.VPS_APP_DIR || '/var/www/checkmockup' }}"
            cd "$APP_DIR"
            if [[ ! -f .env ]]; then
              echo "ERROR: .env not found. Create it on the server first; deploy never overwrites or generates it."
              exit 1
            fi
            chmod +x deploy/vps-remote-build.sh deploy/migrate.sh
            VPS_APP_DIR="$APP_DIR" bash deploy/vps-remote-build.sh
