# Manual production deploy — run from GitHub Actions → Deploy to VPS → Run workflow.
# One-time setup: add repository secrets (see README → Manual VPS deploy).

name: Deploy to VPS

on:
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR != '' && secrets.VPS_APP_DIR || '/var/www/checkmockup' }}"
            cd "$APP_DIR"
            if [[ ! -f .env ]]; then
              echo "ERROR: .env not found. Create it on the server first; deploy never overwrites or generates it."
              exit 1
            fi
            ENV_BACKUP="$(mktemp)"
            cp .env "$ENV_BACKUP"
            git fetch origin main
            git reset --hard origin/main
            cp "$ENV_BACKUP" .env
            rm -f "$ENV_BACKUP"
            chmod +x deploy/vps-deploy.sh
            SKIP_GIT_PULL=1 VPS_APP_DIR="$APP_DIR" bash deploy/vps-deploy.sh
