# Static docs only — GitHub Pages cannot run the full Next.js app.
# Repo Settings → Pages → Deploy from branch → gh-pages → / (root)
# Does NOT use actions/deploy-pages (avoids deployment_queued hangs).

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish docs/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs
          force_orphan: true
          disable_nojekyll: true
          commit_message: "docs: publish from ${{ github.sha }}"

      - name: Summary
        run: |
          {
            echo "## Docs published to gh-pages"
            echo ""
            echo "Site: https://bhupimahey.github.io/dsbgroup-app/"
            echo ""
            echo "### Required GitHub Pages setting (one time)"
            echo "Settings → Pages → **Deploy from a branch** → branch \`gh-pages\` → folder \`/(root)\`"
            echo ""
            echo "### If another workflow is stuck on \`deployment_queued\`"
            echo "Cancel that run. It is using \`actions/deploy-pages\`, which this repo no longer uses."
            echo "Do **not** set Pages source to \"GitHub Actions\"."
          } >> "$GITHUB_STEP_SUMMARY"
