name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci
          MYSQL_DATABASE: dsb_law
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      DATABASE_URL: mysql://root:ci@127.0.0.1:3306/dsb_law
      AUTH_SECRET: ci-github-actions-secret-min-32-chars
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: https://www.dsblawgroup.com
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build full Next.js app
        run: npm run build
