proxy_cache_path /var/cache/nginx/pages levels=1:2 keys_zone=pages:128m max_size=1g inactive=15m use_temp_path=off;

map $request_method $skip_cache_method {
    default 1;
    GET     0;
    HEAD    0;
}

map $request_uri $skip_cache_uri {
    default 0;
    ~^/admin                         1;
    ~^/api/                          1;
    ~^/account                       1;
    ~^/login                         1;
    ~^/register                      1;
    ~^/forgot-password               1;
    ~^/reset-password                1;
    ~^/verify-email                  1;
    ~^/verify-subscriber             1;
}

map $http_cookie $skip_cache_cookie {
    default 0;
    "~*authjs\.session-token"        1;
    "~*__Secure-authjs\.session-token" 1;
    "~*next-auth\.session-token"     1;
}

map "$skip_cache_method$skip_cache_uri$skip_cache_cookie" $skip_page_cache {
    default 0;
    ~1      1;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20M;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Docker DNS — re-resolve "web" after scale/rebuild (open-source nginx pattern)
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /_next/static/ {
    set $upstream_web web;
    proxy_pass http://$upstream_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  location /images/ {
    set $upstream_web web;
    proxy_pass http://$upstream_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  location = /favicon.ico {
    set $upstream_web web;
    proxy_pass http://$upstream_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
  }

  location / {
    set $upstream_web web;
    proxy_pass http://$upstream_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_cache pages;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 301 302 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_bypass $skip_page_cache;
    proxy_no_cache $skip_page_cache;
    add_header X-Cache-Status $upstream_cache_status always;
  }
}
